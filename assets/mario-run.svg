<svg viewBox="0 0 800 240" width="800" height="240" xmlns="http://www.w3.org/2000/svg">
  <style>
    .world { animation: scroll 6s linear infinite; }
    @keyframes scroll { to { transform: translateX(-800px); } }

    .f1 { animation: fA .28s steps(1) infinite; }
    .f2 { animation: fB .28s steps(1) infinite; }
    @keyframes fA { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes fB { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

    .bob { animation: bob .28s ease-in-out infinite; }
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

    .coin { transform-box: fill-box; transform-origin: center; animation: spin .5s linear infinite; }
    @keyframes spin { 0% { transform: scaleX(1); } 50% { transform: scaleX(.15); } 100% { transform: scaleX(1); } }

    .cloud { animation: drift 14s linear infinite; }
    @keyframes drift { to { transform: translateX(-800px); } }

    .hud { font-family: 'Courier New', monospace; font-weight: bold; fill: #ffffff; font-size: 14px; letter-spacing: 1px; }
    .qmark { font-family: 'Courier New', monospace; font-weight: bold; fill: #7a4a00; font-size: 22px; }
  </style>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="240" rx="12" fill="#1a1b27"/>

  <!-- Stars -->
  <g fill="#ffffff" opacity="0.5">
    <rect x="60" y="28" width="3" height="3"/><rect x="210" y="48" width="2" height="2"/>
    <rect x="330" y="22" width="3" height="3"/><rect x="470" y="40" width="2" height="2"/>
    <rect x="600" y="26" width="3" height="3"/><rect x="720" y="50" width="2" height="2"/>
  </g>

  <!-- HUD -->
  <text class="hud" x="24" y="26">JORGEALE90</text>
  <text class="hud" x="330" y="26" fill="#ffcb05">WORLD 1-1</text>
  <text class="hud" x="640" y="26">TIME &#8734;</text>

  <!-- Clouds (drifting, duplicated for seamless loop) -->
  <g class="cloud" opacity="0.9">
    <g fill="#e8ecf8">
      <ellipse cx="150" cy="66" rx="34" ry="14"/><ellipse cx="176" cy="58" rx="22" ry="12"/>
      <ellipse cx="520" cy="52" rx="30" ry="12"/><ellipse cx="544" cy="46" rx="18" ry="10"/>
      <ellipse cx="950" cy="66" rx="34" ry="14"/><ellipse cx="976" cy="58" rx="22" ry="12"/>
      <ellipse cx="1320" cy="52" rx="30" ry="12"/><ellipse cx="1344" cy="46" rx="18" ry="10"/>
    </g>
  </g>

  <!-- Scrolling world: two identical 800px segments -->
  <g class="world">
    <g id="seg">
      <!-- Ground: two rows of bricks -->
      <g>
        <rect x="0" y="192" width="1600" height="48" fill="#9a4b0f"/>
        <g fill="none" stroke="#5e2c05" stroke-width="3">
          <path d="M0,192 H1600 M0,216 H1600"/>
          <path d="M40,192 V216 M120,192 V216 M200,192 V216 M280,192 V216 M360,192 V216 M440,192 V216 M520,192 V216 M600,192 V216 M680,192 V216 M760,192 V216 M840,192 V216 M920,192 V216 M1000,192 V216 M1080,192 V216 M1160,192 V216 M1240,192 V216 M1320,192 V216 M1400,192 V216 M1480,192 V216 M1560,192 V216"/>
          <path d="M0,216 V240 M80,216 V240 M160,216 V240 M240,216 V240 M320,216 V240 M400,216 V240 M480,216 V240 M560,216 V240 M640,216 V240 M720,216 V240 M800,216 V240 M880,216 V240 M960,216 V240 M1040,216 V240 M1120,216 V240 M1200,216 V240 M1280,216 V240 M1360,216 V240 M1440,216 V240 M1520,216 V240"/>
        </g>
      </g>

      <!-- ? Blocks segment 1 -->
      <g>
        <rect x="300" y="88" width="36" height="36" fill="#e9a023" stroke="#7a4a00" stroke-width="3"/>
        <text class="qmark" x="309" y="114">?</text>
        <rect x="344" y="88" width="36" height="36" fill="#b45f1d" stroke="#5e2c05" stroke-width="3"/>
      </g>
      <!-- Coin above block -->
      <g class="coin">
        <ellipse cx="318" cy="64" rx="10" ry="13" fill="#ffcb05" stroke="#c78d00" stroke-width="3"/>
      </g>

      <!-- Pipe segment 1 -->
      <g>
        <rect x="580" y="152" width="52" height="40" fill="#1f9e34" stroke="#0c5c1a" stroke-width="3"/>
        <rect x="572" y="136" width="68" height="20" fill="#27b840" stroke="#0c5c1a" stroke-width="3"/>
      </g>

      <!-- ? Block segment 2 (x + 800) -->
      <g>
        <rect x="1060" y="88" width="36" height="36" fill="#e9a023" stroke="#7a4a00" stroke-width="3"/>
        <text class="qmark" x="1069" y="114">?</text>
      </g>
      <g class="coin">
        <ellipse cx="1078" cy="64" rx="10" ry="13" fill="#ffcb05" stroke="#c78d00" stroke-width="3"/>
      </g>

      <!-- Pipe segment 2 -->
      <g>
        <rect x="1380" y="152" width="52" height="40" fill="#1f9e34" stroke="#0c5c1a" stroke-width="3"/>
        <rect x="1372" y="136" width="68" height="20" fill="#27b840" stroke="#0c5c1a" stroke-width="3"/>
      </g>
    </g>
  </g>

  <!-- Mario (fixed position, running in place over scrolling world) -->
  <g transform="translate(110,102)">
    <g class="bob">
      <g transform="scale(6)">
        <!-- ══ Common: cap, face, torso ══ -->
        <!-- Cap -->
        <rect x="3" y="0" width="6" height="1" fill="#e60012"/>
        <rect x="2" y="1" width="8" height="1" fill="#e60012"/>
        <!-- Hair + face -->
        <rect x="2" y="2" width="2" height="2" fill="#6b3f1d"/>
        <rect x="4" y="2" width="6" height="2" fill="#ffc8a8"/>
        <rect x="7" y="2" width="1" height="1" fill="#222222"/>
        <!-- Mustache + chin -->
        <rect x="3" y="4" width="2" height="1" fill="#ffc8a8"/>
        <rect x="5" y="4" width="4" height="1" fill="#6b3f1d"/>
        <!-- Shirt -->
        <rect x="3" y="5" width="6" height="1" fill="#e60012"/>
        <!-- Overalls -->
        <rect x="3" y="6" width="6" height="4" fill="#2158c9"/>
        <rect x="4" y="6" width="1" height="1" fill="#ffcb05"/>
        <rect x="7" y="6" width="1" height="1" fill="#ffcb05"/>

        <!-- ══ Frame 1: legs spread, arms swinging ══ -->
        <g class="f1">
          <rect x="1" y="6" width="2" height="2" fill="#ffc8a8"/>
          <rect x="9" y="7" width="2" height="2" fill="#ffc8a8"/>
          <rect x="2" y="10" width="3" height="3" fill="#2158c9"/>
          <rect x="7" y="10" width="3" height="3" fill="#2158c9"/>
          <rect x="1" y="13" width="3" height="2" fill="#4a2a10"/>
          <rect x="8" y="13" width="3" height="2" fill="#4a2a10"/>
        </g>

        <!-- ══ Frame 2: legs together, arms down ══ -->
        <g class="f2">
          <rect x="2" y="7" width="1" height="2" fill="#ffc8a8"/>
          <rect x="9" y="7" width="1" height="2" fill="#ffc8a8"/>
          <rect x="4" y="10" width="4" height="3" fill="#2158c9"/>
          <rect x="4" y="13" width="4" height="2" fill="#4a2a10"/>
        </g>
      </g>
    </g>
  </g>
</svg>
